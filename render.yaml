services:
  - type: web
    name: seller-rating
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_TRUST_PROXY
        value: "true"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEEDS
        value: "true"
      - key: SEED_SAMPLE_REVIEWS
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD_HASH
        sync: false

