services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seller-rating-app
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: seller-rating-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-seller_reviews}
      MYSQL_USER: ${DB_USER:-seller_user}
      MYSQL_PASSWORD: ${DB_PASS:-seller_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
    ports:
      - "${DB_PUBLIC_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root_pass}"]
      interval: 8s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  mysql_data:

